name: Madcap Deals Monitor

on:
  schedule:
    - cron: '2 * * * *'
  workflow_dispatch:
    inputs:
      continue_monitoring:
        description: 'Queue another run after 5 minutes'
        required: false
        default: 'true'

jobs:
  run-monitor:
    concurrency:
      group: madcap-monitor
      cancel-in-progress: false

    runs-on: ubuntu-latest
    permissions:
      actions: write # Allows queueing the next monitor run
      contents: write # Allows pushing the updated products.json back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Run monitor
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }},abdullahhachimi1963@gmail.com
        run: node monitor.js --once

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add products.json
          if git commit -m "chore: update products database [skip ci]"; then
            git push
          else
            echo "No changes to commit"
          fi

      - name: Queue next run
        if: ${{ always() && !cancelled() && (github.event_name == 'schedule' || inputs.continue_monitoring == 'true') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sleep 300
          gh workflow run monitor.yml --ref master -f continue_monitoring=true
